version: '3.8'
services:
  agent-zero-axiom:
    image: agent0ai/agent-zero:latest
    container_name: agent-zero-axiom
    ports:
      - "7073:80"
    volumes:
      - /home/tunedr/axiom-data:/a0
      - /home/tunedr/axiom-reports:/reports
    environment:
      # AXIOM executor-only layer: raw search and retrieval, no synthesis
      # Fleet model standard as of 2026-06-05 (DO NOT CHANGE without Branden authorization)
      - CHAT_MODEL=llama3.2:latest
      - CHAT_MODEL_BASE_URL=http://192.168.1.2:11434
      - UTILITY_MODEL=qwen2.5-coder:7b
      - UTILITY_MODEL_BASE_URL=http://192.168.1.136:11434
      - EMBED_MODEL=nomic-embed-text:latest
      - EMBED_MODEL_BASE_URL=http://192.168.1.2:11434
      # Codex OAuth — Planner / Validator / Compiler layers in the OpenWebUI pipe
      - OPENAI_API_TYPE=openai
      - OPENAI_API_BASE=https://api.openai.com/v1
      # API key placeholder — Codex OAuth fills this after browser auth
      - OPENAI_API_KEY=USE_OAUTH
      # Supporting services
      - GOTENBERG_URL=http://librarian-gotenberg:3000
      - PAPERLESS_URL=http://paperless-ngx:8000
      - LIBRARIAN_URL=http://agent-zero-librarian:80
      - ANYTHINGLLM_URL=http://anythingllm:3001
    restart: unless-stopped
    networks:
      - de-knowledge_librarian-net

networks:
  de-knowledge_librarian-net:
    external: true
